            (function () {

                    const HOLD_DURATION = 2000;
                    const CIRCLE_CIRCUMFERENCE = 2 * Math.PI * 58;

                    let isHolding = false;
                    let startTime = 0;
                    let animationId = null;
                    let hasTriggered = false;

                    function updateProgress(progress) {
                        const dashLength = progress * CIRCLE_CIRCUMFERENCE;
                        progressCircle.setAttribute('stroke-dasharray', `${dashLength} ${CIRCLE_CIRCUMFERENCE}`);
                    }

                    function animateProgress() {
                        if (!isHolding || hasTriggered) return;
                        const elapsed = Date.now() - startTime;
                        const progress = Math.min(elapsed / HOLD_DURATION, 1);
                        updateProgress(progress);
                        if (progress >= 1) {
                            hasTriggered = true;
                            showDistractionsScreen();
                        } else {
                            animationId = requestAnimationFrame(animateProgress);
                        }
                    }

                    function animateProgressBack() {
                        const current = parseFloat(progressCircle.getAttribute('stroke-dasharray')) || 0;
                        if (current <= 0 || isHolding) return;
                        const newDash = Math.max(0, current - 15);
                        progressCircle.setAttribute('stroke-dasharray', `${newDash} ${CIRCLE_CIRCUMFERENCE}`);
                        if (newDash > 0) requestAnimationFrame(animateProgressBack);
                    }

                    function startHold(e) {
                        e.preventDefault();
                        if (hasTriggered) return;
                        isHolding = true;

                        animateProgress();
                    }

                    function stopHold(e) {
                        e.preventDefault();
                        if (hasTriggered) return;

                    function initDraggableCards() {
                        const cards = document.querySelectorAll('.draggable-card');
                        cards.forEach(card => {
                            let isDragging = false;
                            let startX, startY, currentX = 0, currentY = 0;
                            const transform = card.style.transform;
                            const rotateMatch = transform.match(/rotate\(([^)]+)\)/);
                            const rotate = rotateMatch ? rotateMatch[1] : '0deg';

                            card.addEventListener('mousedown', startDrag);
                            card.addEventListener('touchstart', startDrag, { passive: false });

                            function startDrag(e) {
                                isDragging = true;
                                const point = e.touches ? e.touches[0] : e;
                                startX = point.clientX - currentX;
                                startY = point.clientY - currentY;
                                card.style.cursor = 'grabbing';
                                card.style.zIndex = '20';
                                document.addEventListener('mousemove', drag);
                                document.addEventListener('mouseup', endDrag);
                                document.addEventListener('touchmove', drag, { passive: false });
                                document.addEventListener('touchend', endDrag);
                            }

                            function drag(e) {
                                if (!isDragging) return;
                                e.preventDefault();
                                const point = e.touches ? e.touches[0] : e;
                                currentX = point.clientX - startX;
                                currentY = point.clientY - startY;
                                card.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotate})`;
                            }

                            function endDrag() {
                                isDragging = false;
                                card.style.cursor = 'grab';
                                card.style.zIndex = '10';
                                document.removeEventListener('mousemove', drag);
                                document.removeEventListener('mouseup', endDrag);
                                document.removeEventListener('touchmove', drag);
                                document.removeEventListener('touchend', endDrag);
                            }
                        });
                    }

                                <!-- Top card with photo -->
                                <div id="photo-card" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); border-radius: 16px; padding: 12px; padding-bottom: 60px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4); cursor: pointer; transition: all 0.5s ease; z-index: 2;">
                                    <img id="current-photo" src="/images/1.png" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;" alt="Memory">
                                    
                                    <!-- Progress indicators -->
                                    <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px;">
                                        <div id="dot-1" style="width: 40px; height: 6px; border-radius: 3px; background: #f472b6;"></div>
                                        <div id="dot-2" style="width: 40px; height: 6px; border-radius: 3px; background: rgba(244,114,182,0.3);"></div>
                                    </div>
                                </div>
                            </div>
                            <p style="color: rgba(255,255,255,0.4); font-size: 14px;">Tap the photo to continue</p>
                        </div>
                    `;

                            let photoIndex = 0;
                            const photos = ['/images/1.png', '/images/2.png'];
                            const photoCard = document.getElementById('photo-card');
                            const currentPhoto = document.getElementById('current-photo');
                            const dot1 = document.getElementById('dot-1');
                            const dot2 = document.getElementById('dot-2');

                            photoCard.addEventListener('click', () => {
                                photoIndex++;
                                if (photoIndex < photos.length) {
                                    // Animate card swipe
                                    photoCard.style.transform = 'translateX(-200px) rotate(-20deg)';
                                    photoCard.style.opacity = '0';

                                    setTimeout(() => {
                                        currentPhoto.src = photos[photoIndex];
                                        photoCard.style.transition = 'none';
                                        photoCard.style.transform = 'translateX(200px) rotate(20deg)';

                                        setTimeout(() => {
                                            photoCard.style.transition = 'all 0.5s ease';
                                            photoCard.style.transform = 'translateX(0) rotate(0)';
                                            photoCard.style.opacity = '1';
                                        }, 50);

                                        // Update dots
                                        dot1.style.background = 'rgba(244,114,182,0.3)';
                                        dot2.style.background = '#f472b6';
                                    }, 300);
                                } else {
                                    // Go to card screen
                                    showCardScreen();
                                }
                            });
                        }

                        function showCardScreen() {
                            const mainContent = document.querySelector('.px-4.py-6');
                            if (mainContent) {
                                mainContent.innerHTML = `
                        <div style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; text-align: center;">
                            <h2 style="font-size: 1.875rem; font-weight: 500; color: white; margin-bottom: 0.5rem; font-family: 'Shantell Sans', cursive;">For my Cutiepie :)</h2>
                            <p style="color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 2rem;">Tap the card to read</p>
                            
                            <!-- 3D Book Container -->
                            <div id="book-container" style="position: relative; width: 560px; height: 420px; perspective: 2000px; transition: transform 0.8s ease; transform: translateX(-140px);">
                                
                                <!-- Right page (Message) - Always visible behind -->
                                <div id="right-page" style="position: absolute; right: 0; top: 0; width: 280px; height: 100%; background: #f5f0e8; border-radius: 0 12px 12px 0; border: 8px solid #a78bfa; border-left: 2px solid #d4c8e0; padding: 16px; box-shadow: 5px 5px 25px rgba(0,0,0,0.3);">
                                    <div style="background: #fef3f3; width: 100%; height: 100%; border-radius: 8px; padding: 20px; display: flex; flex-direction: column; justify-content: center; position: relative;">
                                        <p style="font-family: 'Shantell Sans', cursive; font-size: 14px; color: #2d2d2d; line-height: 1.7; text-align: left; margin: 0;">
                                            I hope this year brings you calm mornings, peaceful nights,
                                            and little moments that make you smile without any reason.
                                            <br><br>
                                            No matter what this year holds for you,
                                            I hope you always feel supported, valued, and understood.
                                            May every challenge turn into strength,
                                            and every quiet day remind you of how special you truly are.
                                        </p>
                                        <div style="position: absolute; right: 12px; top: -16px; width: 5px; height: 50%; background: linear-gradient(to bottom, #f472b6, #c084fc); border-radius: 0 0 3px 3px;"></div>
                                    </div>
                                </div>
                                
                                <!-- Card Cover (Flipping element) -->
                                <div id="card-cover" style="position: absolute; right: 0; top: 0; width: 280px; height: 100%; transform-style: preserve-3d; transform-origin: left center; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; z-index: 10;">
                                    <!-- Front (Card Image) -->
                                    <div style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 8px solid #a78bfa;">
                                        <img src="/images/card.png?v=9" style="width: 100%; height: 100%; object-fit: cover;" alt="New Year Card">
                                    </div>
                                    <!-- Back (Blank Inside) -->
                                    <div style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; transform: rotateY(180deg); background: #f5f0e8; border-radius: 12px 0 0 12px; border: 8px solid #a78bfa; border-right: 2px solid #d4c8e0; padding: 16px; box-shadow: -5px 5px 25px rgba(0,0,0,0.3);">
                                        <div style="background: #fef3f3; width: 100%; height: 100%; border-radius: 8px;"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;

                                let isOpen = false;
                                const bookContainer = document.getElementById('book-container');
                                const cardCover = document.getElementById('card-cover');

                                cardCover.addEventListener('click', () => {
                                    if (!isOpen) {
                                        cardCover.style.transform = 'rotateY(-180deg)';
                                        bookContainer.style.transform = 'translateX(0)';
                                        isOpen = true;
                                    } else {
                                        cardCover.style.transform = 'rotateY(0deg)';
                                        bookContainer.style.transform = 'translateX(-140px)';
                                        isOpen = false;
                                    }
                                });
                            }
                        }
                    }

                    function showFinalMessage() {
                        const mainContent = document.querySelector('.px-4.py-6');
                        if (mainContent) {
                            mainContent.innerHTML = `
                        <div class="h-full flex flex-col items-center justify-center p-6 text-center max-w-2xl mx-auto">
                            <h2 class="text-3xl md:text-5xl font-medium text-white mb-8" style="background: linear-gradient(135deg, #fda5d5, #d9b3ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Happy New Year! ✨</h2>
                            <p class="text-white/70 text-lg leading-relaxed whitespace-pre-line mb-8">I hope this year brings you calm mornings, peaceful nights,
and little moments that make you smile without any reason.

No matter what this year holds for you,
I hope you always feel supported, valued, and understood.
May every challenge turn into strength,
and every quiet day remind you of how special you truly are.

You deserve a year filled with happiness,
with moments that feel light, warm, and meaningful.
May this year be gentle with you,
and give you everything your heart has been hoping for.

Wishing you a beautiful New Year ✨</p>
                        </div>
                    `;
                            createConfetti();
                        }
                    }

                    function createConfetti() {
                        const colors = ['#ff6b9d', '#c084fc', '#ffd700', '#60a5fa', '#4ade80', '#fb923c'];
                        for (let i = 0; i < 100; i++) {
                            const confetti = document.createElement('div');
                            confetti.style.cssText = `
                        position: fixed;
                        width: ${Math.random() * 10 + 5}px;
                        height: ${Math.random() * 10 + 5}px;
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        left: ${Math.random() * 100}vw;
                        top: -20px;
                        border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
                        pointer-events: none;
                        z-index: 1000;
                        animation: confettiFall ${Math.random() * 3 + 2}s linear forwards;
                    `;
                            document.body.appendChild(confetti);
                            setTimeout(() => confetti.remove(), 5000);
                        }
                    }

                    // Add confetti animation
                    const style = document.createElement('style');
                    style.textContent = `
                @keyframes confettiFall {
                    to {
                        transform: translateY(100vh) rotate(720deg);
                        opacity: 0;
                    }
                }
            `;
                    document.head.appendChild(style);

                    heartButton.addEventListener('mousedown', startHold);
                    heartButton.addEventListener('mouseup', stopHold);
                    heartButton.addEventListener('mouseleave', stopHold);
                    heartButton.addEventListener('touchstart', startHold, { passive: false });
                    heartButton.addEventListener('touchend', stopHold, { passive: false });
                    heartButton.addEventListener('touchcancel', stopHold, { passive: false });
                });
            })();
    </script>
</body>

</html>
