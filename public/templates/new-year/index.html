<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy New Year 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/CustomEase.min.js"></script>

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Great+Vibes&display=swap");

        *,
        *:after,
        *:before {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(to bottom, #020111 0%, #191621 100%);
            overflow: hidden;
            height: 100vh;
            color: white;
            font-family: "Montserrat", sans-serif;
            perspective: 1200px;
            user-select: none;
        }

        /* --- Start Overlay --- */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 1, 17, 0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }

        #start-overlay h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            color: white;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .play-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            animation: pulse 2s infinite;
        }

        .play-icon {
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid white;
            margin-left: 5px;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 140, 0, 0.7);
            }

            70% {
                transform: scale(1.1);
                box-shadow: 0 0 0 20px rgba(255, 140, 0, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 140, 0, 0);
            }
        }

        /* --- UI Overlay --- */
        .msg-container {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .msg {
            font-family: 'Great Vibes', cursive;
            font-size: 8vw;
            color: #fff;
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #ff00de,
                0 0 30px #ff00de,
                0 0 40px #ff00de;
            opacity: 0;
            transform: rotate(-5deg);
        }

        .sub-msg {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2vw;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            margin-top: 10px;
            opacity: 0;
        }

        /* --- Year Container --- */
        .year-wrapper {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            perspective: 1000px;
            z-index: 5;
            pointer-events: none;
        }

        .year {
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }

        .digit {
            font-size: 15vw;
            font-weight: 900;
            line-height: 1;
            position: relative;
            display: inline-block;
            background: linear-gradient(180deg, #fff 0%, #ffd700 50%, #bf953f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
            transform-origin: center bottom;
        }

        .static-digit {
            opacity: 0;
        }

        .swap-container {
            position: relative;
            width: 11vw;
            height: 16vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .old {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(180deg, #fff 0%, #a0a0a0 50%, #404040 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform-origin: center bottom;
            width: 100%;
            text-align: center;
        }

        .new {
            background: linear-gradient(180deg, #fff 0%, #ffd700 50%, #bf953f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
            opacity: 1;
        }

        /* --- Balloon Logic --- */
        .balloon-rig {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
        }

        .balloon {
            width: 120px;
            height: 145px;
            background: radial-gradient(circle at 35% 30%, #ff5e62, #990033);
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            position: absolute;
            bottom: calc(50% + 150px);
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset -10px -10px 20px rgba(0, 0, 0, 0.3), 5px 5px 15px rgba(255, 150, 150, 0.4);
            z-index: 10;
        }

        .balloon::after {
            content: "";
            position: absolute;
            top: 15%;
            left: 20%;
            width: 20px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(25deg);
        }

        .balloon::before {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 10px;
            background: #990033;
            border-radius: 2px;
        }

        .string {
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: 2px;
            height: 150px;
            background: rgba(255, 255, 255, 0.5);
            transform: translateX(-50%);
            transform-origin: bottom center;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Music Toggle */
        .music-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 16px;
            cursor: pointer;
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .music-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .music-toggle.muted {
            opacity: 0.5;
        }

        /* Recipient name */
        .recipient-name {
            font-family: 'Great Vibes', cursive;
            font-size: 2rem;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            display: none;
            margin-top: 0.3rem;
        }

        @media (max-width: 768px) {
            .msg {
                font-size: 15vw;
            }

            .sub-msg {
                font-size: 3vw;
            }

            .digit {
                font-size: 25vw;
            }

            .swap-container {
                width: 18vw;
                height: 26vw;
            }

            .balloon {
                width: 80px;
                height: 100px;
                bottom: calc(50% + 100px);
            }

            .string {
                height: 100px;
            }

            .recipient-name {
                font-size: 1.5rem;
            }

            .music-toggle {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <!-- Overlay to handle Audio Context restrictions -->
    <div id="start-overlay">
        <h1>Tap to Celebrate</h1>
        <div class="play-btn">
            <div class="play-icon"></div>
        </div>
    </div>

    <!-- Music Toggle Button -->
    <button class="music-toggle" id="music-toggle" title="Toggle Music">🔊</button>

    <canvas id="fireworksCanvas"></canvas>

    <div class="msg-container">
        <div class="msg">Happy New Year</div>
        <div class="recipient-name" id="recipient-name"></div>
        <div class="sub-msg">The Future is Golden</div>
    </div>

    <div class="year-wrapper">
        <div class="year">
            <span class="digit static-digit">2</span>
            <span class="digit static-digit">0</span>
            <span class="digit static-digit">2</span>

            <div class="swap-container">
                <span class="digit old">5</span>

                <div class="balloon-rig">
                    <div class="string"></div>
                    <div class="balloon"></div>
                    <span class="digit new">6</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * ------------------------------------------------------------------
         * PART 0: PROCEDURAL AUDIO ENGINE (Web Audio API)
         * ------------------------------------------------------------------
         */
        const SoundManager = {
            ctx: null,
            init: function () {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                } else if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },

            // --- SOUND EFFECTS ---
            playLaunch: function () {
                if (!this.ctx) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, t);
                osc.frequency.exponentialRampToValueAtTime(800, t + 1);
                gain.gain.setValueAtTime(0.05, t);
                gain.gain.linearRampToValueAtTime(0, t + 1);
                osc.start(t);
                osc.stop(t + 1);
            },

            playExplosion: function () {
                if (!this.ctx) return;
                const t = this.ctx.currentTime;
                const bufferSize = this.ctx.sampleRate * 2;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1000, t);
                filter.frequency.exponentialRampToValueAtTime(100, t + 1);
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.2, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start(t);
            },

            playThud: function () {
                if (!this.ctx) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.exponentialRampToValueAtTime(40, t + 0.3);
                gain.gain.setValueAtTime(0.5, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                osc.start(t);
                osc.stop(t + 0.4);
            },

            playRelease: function () {
                if (!this.ctx) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, t);
                osc.frequency.linearRampToValueAtTime(800, t + 0.2);
                gain.gain.setValueAtTime(0.05, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.2);
                osc.start(t);
                osc.stop(t + 0.2);
            },

            // --- MUSIC SEQUENCER (Auld Lang Syne) ---
            playTone: function (freq, duration, startTime) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime);

                // Envelope (Attack, Decay, Sustain, Release)
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.15, startTime + 0.05); // Attack
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration); // Decay/Release

                osc.start(startTime);
                osc.stop(startTime + duration + 0.1);
            },

            playMusic: function () {
                if (!this.ctx) return;

                // Note Frequencies
                const N = {
                    C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23, G4: 392.00, A4: 440.00, B4: 493.88,
                    C5: 523.25, D5: 587.33, E5: 659.25, F5: 698.46
                };

                // Auld Lang Syne (Key of F Major)
                // Format: [Frequency, Duration (beats)]
                // 1 beat = 0.5 seconds
                const melody = [
                    [N.C4, 1], [N.F4, 1.5], [N.F4, 0.5], [N.F4, 1], [N.A4, 1], [N.G4, 1.5], [N.F4, 0.5], [N.G4, 1], [N.A4, 1],
                    [N.F4, 1.5], [N.F4, 0.5], [N.A4, 1], [N.C5, 1], [N.D5, 3], // "And days of auld lang syne"

                    [N.C5, 1], [N.A4, 1.5], [N.F4, 0.5], [N.F4, 1], [N.A4, 1], [N.G4, 1.5], [N.F4, 0.5], [N.G4, 1], [N.A4, 1], // Chorus
                    [N.F4, 1.5], [N.D4, 0.5], [N.D4, 1], [N.C4, 1], [N.F4, 3]
                ];

                const beatTime = 0.5; // Seconds per beat
                let now = this.ctx.currentTime + 0.5; // Start with slight delay

                melody.forEach(([freq, beats]) => {
                    this.playTone(freq, beats * beatTime, now);
                    now += beats * beatTime;
                });
            }
        };

        /**
         * ------------------------------------------------------------------
         * PART 1: VISUALS
         * ------------------------------------------------------------------
         */
        const canvas = document.getElementById("fireworksCanvas");
        const ctx = canvas.getContext("2d");

        let width, height;
        let particles = [];
        let rockets = [];
        let cityPoints = [];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            generateCity();
        }
        window.addEventListener('resize', resize);
        resize();

        function generateCity() {
            cityPoints = [];
            let x = 0;
            while (x < width) {
                let w = 20 + Math.random() * 60;
                let h = 20 + Math.random() * 150;
                cityPoints.push({ x, w, h });
                x += w;
            }
        }

        function drawCity() {
            ctx.fillStyle = "#030305";
            ctx.beginPath();
            ctx.moveTo(0, height);
            for (let b of cityPoints) {
                ctx.lineTo(b.x, height - b.h);
                ctx.lineTo(b.x + b.w, height - b.h);
            }
            ctx.lineTo(width, height);
            ctx.fill();
        }

        class Rocket {
            constructor(x, targetY) {
                this.x = x;
                this.y = height;
                this.targetY = targetY;
                this.speed = 12 + Math.random() * 4;
                this.angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.2;
                this.vx = Math.cos(this.angle) * this.speed * 0.2;
                this.vy = Math.sin(this.angle) * this.speed;
                this.hue = Math.floor(Math.random() * 360);
                this.trail = [];
                this.dead = false;
                SoundManager.playLaunch();
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 5) this.trail.shift();
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.15;
                this.vx *= 0.99;

                if (Math.random() > 0.8) {
                    particles.push(new Particle(this.x, this.y, this.hue, true));
                }

                if (this.vy >= -1 || this.y <= this.targetY) {
                    this.dead = true;
                    createExplosion(this.x, this.y, this.hue);
                }
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.trail[0].x, this.trail[0].y);
                for (let i = 1; i < this.trail.length; i++) {
                    ctx.lineTo(this.trail[i].x, this.trail[i].y);
                }
                ctx.strokeStyle = `hsl(${this.hue}, 100%, 50%)`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        class Particle {
            constructor(x, y, hue, isSpark = false) {
                this.x = x;
                this.y = y;
                this.hue = hue || Math.floor(Math.random() * 360);
                this.isSpark = isSpark;
                let angle = Math.random() * Math.PI * 2;
                let speed = isSpark ? Math.random() * 2 : Math.random() * 5 + 2;
                this.isWillow = !isSpark && Math.random() > 0.8;
                if (this.isWillow) speed *= 0.5;

                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = isSpark ? 0.03 : (Math.random() * 0.015 + 0.005);
                this.gravity = this.isWillow ? 0.02 : 0.05;
                this.friction = this.isWillow ? 0.92 : 0.95;
                this.prevX = x;
                this.prevY = y;
            }

            update() {
                this.prevX = this.x;
                this.prevY = this.y;
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.alpha -= this.decay;
                if (this.alpha < 0.3) this.alpha -= Math.random() * 0.05;
            }

            draw() {
                ctx.strokeStyle = `hsla(${this.hue}, 100%, ${this.isWillow ? 50 : 60}%, ${this.alpha})`;
                ctx.lineWidth = this.isWillow ? 1 : 2;
                ctx.beginPath();
                ctx.moveTo(this.prevX, this.prevY);
                ctx.lineTo(this.x, this.y);
                ctx.stroke();

                if (!this.isSpark && this.alpha > 0.5) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `hsla(${this.hue}, 100%, 50%, 0.5)`;
                } else {
                    ctx.shadowBlur = 0;
                }
            }
        }

        function createExplosion(x, y, hue) {
            SoundManager.playExplosion();

            let count = 80;
            if (Math.random() > 0.7) {
                for (let i = 0; i < 50; i++) {
                    let angle = (Math.PI * 2 / 50) * i;
                    let speed = 4;
                    let p = new Particle(x, y, hue);
                    p.vx = Math.cos(angle) * speed;
                    p.vy = Math.sin(angle) * speed;
                    particles.push(p);
                }
            } else {
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle(x, y, hue));
                }
            }
            ctx.globalCompositeOperation = "lighter";
            ctx.fillStyle = `hsla(${hue}, 100%, 80%, 0.3)`;
            ctx.beginPath();
            ctx.arc(x, y, 100, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalCompositeOperation = "source-over";
        }

        let autoLaunchTimer = 0;
        let finaleMode = false;
        let animationStarted = false;

        function loop() {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'source-over';

            if (window._showCity !== false) drawCity();

            if (animationStarted) {
                autoLaunchTimer++;
                let interval = finaleMode ? window._fireworkInterval : 40;
                if (autoLaunchTimer > interval) {
                    rockets.push(new Rocket(
                        Math.random() * width * 0.8 + width * 0.1,
                        height * 0.2 + Math.random() * height * 0.3
                    ));
                    autoLaunchTimer = 0;
                }
            }

            for (let i = rockets.length - 1; i >= 0; i--) {
                rockets[i].update();
                rockets[i].draw();
                if (rockets[i].dead) rockets.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(loop);
        }
        loop();

        const overlay = document.getElementById('start-overlay');

        function startExperience() {
            if (animationStarted && !gsap.globalTimeline.paused()) return;

            // If paused, resume instead of restarting
            if (animationStarted && gsap.globalTimeline.paused()) {
                gsap.globalTimeline.resume();
                if (SoundManager.ctx && SoundManager.ctx.state === 'suspended') {
                    SoundManager.ctx.resume();
                }
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);
                // Notify parent that we're playing
                if (isEmbedded) {
                    window.parent.postMessage({ type: 'playing' }, '*');
                }
                return;
            }

            SoundManager.init();

            // Start Music!
            SoundManager.playMusic();

            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);

            animationStarted = true;
            startTimeline();

            // Notify parent that we're playing
            if (isEmbedded) {
                window.parent.postMessage({ type: 'playing' }, '*');
            }
        }

        overlay.addEventListener('click', startExperience);
        overlay.addEventListener('touchstart', startExperience);

        window.addEventListener('mousedown', (e) => {
            if (animationStarted) {
                rockets.push(new Rocket(e.clientX, e.clientY));
            }
        });

        function startTimeline() {
            const tl = gsap.timeline();

            gsap.set(".static-digit", { y: 200, rotationX: -90, opacity: 0 });
            gsap.set(".old", { yPercent: -50, xPercent: -50, y: -800, opacity: 1 });

            tl.to(".static-digit", {
                duration: 1.2,
                y: 0,
                rotationX: 0,
                opacity: 1,
                stagger: 0.2,
                ease: "back.out(1.5)"
            })

                .to(".old", {
                    duration: 1.5,
                    y: 0,
                    ease: "bounce.out",
                    onStart: () => SoundManager.playLaunch()
                }, "-=0.5")

                .add(() => SoundManager.playThud())

                .to(".year-wrapper", {
                    duration: 0.2,
                    y: "+=10",
                    yoyo: true,
                    repeat: 3,
                    ease: "power1.inOut"
                }, "-=0.1")

                .to({}, { duration: 0.5 })

                .to(".old", {
                    duration: 1,
                    y: 800,
                    rotationZ: 45,
                    opacity: 0,
                    ease: "power2.in"
                }, "swap")

                .to(".balloon-rig", {
                    duration: 3,
                    opacity: 1,
                    y: 0,
                    ease: "elastic.out(1, 0.5)",
                    startAt: { y: -800 },
                    onStart: () => SoundManager.playLaunch()
                }, "swap-=0.5")

                .to(".balloon", {
                    duration: 4,
                    y: -1500,
                    x: 200,
                    rotation: 15,
                    ease: "power2.in",
                    onStart: () => SoundManager.playRelease()
                }, "+=0.2")

                .to(".string", { duration: 0.5, opacity: 0 }, "<")

                .to(".msg", {
                    duration: 2,
                    opacity: 1,
                    scale: 1.1,
                    textShadow: "0 0 50px #ff00de",
                    ease: "power2.out",
                    onStart: () => {
                        finaleMode = true;
                        setTimeout(() => rockets.push(new Rocket(width * 0.2, height * 0.3)), 100);
                        setTimeout(() => rockets.push(new Rocket(width * 0.8, height * 0.4)), 300);
                        setTimeout(() => rockets.push(new Rocket(width * 0.5, height * 0.2)), 600);
                    }
                }, "-=2")

                .to(".sub-msg", {
                    duration: 1.5,
                    opacity: 1,
                    letterSpacing: "0.5em",
                    startAt: { letterSpacing: "1.5em" },
                    ease: "power2.out"
                }, "-=1.5");
        };
        /**
         * ------------------------------------------------------------------
         * PART 3: CUSTOMIZATION API (postMessage + URL params)
         * ------------------------------------------------------------------
         */
        const isEmbedded = window.self !== window.top;
        let musicPlaying = false;

        // --- Music Toggle ---
        const musicBtn = document.getElementById('music-toggle');
        musicBtn.addEventListener('click', function () {
            if (!musicPlaying) {
                SoundManager.init();
                if (SoundManager.ctx && SoundManager.ctx.state === 'suspended') {
                    SoundManager.ctx.resume();
                }
                SoundManager.playMusic();
                musicPlaying = true;
                musicBtn.textContent = '\u{1F50A}';
                musicBtn.classList.remove('muted');
            } else {
                if (SoundManager.ctx) {
                    SoundManager.ctx.suspend();
                }
                musicPlaying = false;
                musicBtn.textContent = '\u{1F507}';
                musicBtn.classList.add('muted');
            }
        });

        // --- postMessage listener ---
        window.addEventListener('message', function (event) {
            const data = event.data;
            if (!data || !data.type) return;

            if (data.type === 'customize') {
                applyCustomization(data);
            }

            if (data.type === 'play') {
                if (!animationStarted) {
                    startExperience();
                } else if (gsap.globalTimeline.paused()) {
                    // Resume from paused state
                    gsap.globalTimeline.resume();
                    if (SoundManager.ctx && SoundManager.ctx.state === 'suspended') {
                        SoundManager.ctx.resume();
                    }
                    animationStarted = true;
                    // Hide overlay
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.style.display = 'none', 500);
                } else {
                    // Reset and replay animation from start
                    gsap.globalTimeline.clear();
                    gsap.set(".static-digit", { clearProps: "all" });
                    gsap.set(".old", { clearProps: "all" });
                    gsap.set(".balloon-rig", { clearProps: "all" });
                    gsap.set(".balloon", { clearProps: "all" });
                    gsap.set(".string", { clearProps: "all" });
                    gsap.set(".msg", { clearProps: "all" });
                    gsap.set(".sub-msg", { clearProps: "all" });

                    finaleMode = false;
                    rockets = [];
                    particles = [];

                    SoundManager.init();
                    SoundManager.playMusic();
                    musicPlaying = true;
                    musicBtn.textContent = '\u{1F50A}';
                    musicBtn.classList.remove('muted');

                    startTimeline();
                }
            }

            if (data.type === 'pause') {
                gsap.globalTimeline.pause();
                if (SoundManager.ctx && SoundManager.ctx.state === 'running') {
                    SoundManager.ctx.suspend();
                }
                // Show overlay again so user can tap to resume
                overlay.style.display = 'flex';
                overlay.style.opacity = '1';
            }

            if (data.type === 'reset') {
                location.reload();
            }
        });

        // --- Firework interval & city toggle globals ---
        window._fireworkInterval = 10;
        window._showCity = true;

        // --- Reusable customization function ---
        function applyCustomization(data) {
            if (data.message !== undefined) {
                const msgEl = document.querySelector('.msg');
                if (msgEl) msgEl.textContent = data.message;
            }
            if (data.subMessage !== undefined) {
                const subMsgEl = document.querySelector('.sub-msg');
                if (subMsgEl) subMsgEl.textContent = data.subMessage;
            }
            if (data.recipientName !== undefined) {
                const nameEl = document.getElementById('recipient-name');
                if (nameEl) {
                    nameEl.textContent = data.recipientName || '';
                    nameEl.style.display = data.recipientName ? 'block' : 'none';
                }
            }
            if (data.accentColor !== undefined) {
                document.body.style.background = `radial-gradient(ellipse at 50% 0%, ${data.accentColor}33 0%, transparent 50%), linear-gradient(to bottom, #020111 0%, #191621 100%)`;
                const digits = document.querySelectorAll('.digit:not(.old)');
                digits.forEach(d => {
                    d.style.background = `linear-gradient(180deg, #fff 0%, ${data.accentColor} 50%, ${data.accentColor}88 100%)`;
                    d.style.webkitBackgroundClip = 'text';
                    d.style.webkitTextFillColor = 'transparent';
                });
            }
            if (data.glowColor !== undefined) {
                const msgEl = document.querySelector('.msg');
                if (msgEl) {
                    msgEl.style.textShadow = `0 0 5px #fff, 0 0 10px #fff, 0 0 20px ${data.glowColor}, 0 0 30px ${data.glowColor}, 0 0 40px ${data.glowColor}`;
                }
            }
            if (data.font !== undefined) {
                const msgEl = document.querySelector('.msg');
                const subMsgEl = document.querySelector('.sub-msg');
                if (msgEl) msgEl.style.fontFamily = data.font;
                if (subMsgEl) subMsgEl.style.fontFamily = data.font;
            }
            if (data.balloonColor !== undefined) {
                const balloon = document.querySelector('.balloon');
                if (balloon) {
                    balloon.style.background = `radial-gradient(circle at 35% 30%, ${data.balloonColor}, ${data.balloonColor}88)`;
                    balloon.style.boxShadow = `inset -10px -10px 20px rgba(0,0,0,0.3), 5px 5px 15px ${data.balloonColor}66`;
                }
            }
            if (data.yearOld !== undefined || data.yearNew !== undefined) {
                const yearStr = String(data.yearNew || '2026');
                const oldYearStr = String(data.yearOld || '2025');
                const staticDigits = document.querySelectorAll('.static-digit');
                for (let i = 0; i < staticDigits.length && i < yearStr.length - 1; i++) {
                    staticDigits[i].textContent = yearStr[i];
                }
                const newDigit = document.querySelector('.digit.new');
                if (newDigit) newDigit.textContent = yearStr[yearStr.length - 1];
                const oldDigit = document.querySelector('.digit.old');
                if (oldDigit) oldDigit.textContent = oldYearStr[oldYearStr.length - 1];
            }
            if (data.fireworkIntensity !== undefined) {
                const level = parseInt(data.fireworkIntensity);
                window._fireworkInterval = level === 1 ? 60 : level === 3 ? 5 : 10;
            }
            if (data.animationSpeed !== undefined) {
                const speed = parseInt(data.animationSpeed);
                gsap.globalTimeline.timeScale(speed === 1 ? 0.5 : speed === 3 ? 2 : 1);
            }
            if (data.showCity !== undefined) {
                window._showCity = data.showCity === true || data.showCity === 'true';
            }
        }

        // --- Read URL params (fullscreen mode) ---
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.toString().length > 0) {
            setTimeout(() => {
                applyCustomization({
                    message: urlParams.get('message') || undefined,
                    subMessage: urlParams.get('subMessage') || undefined,
                    recipientName: urlParams.get('recipientName') || undefined,
                    accentColor: urlParams.get('accentColor') || undefined,
                    glowColor: urlParams.get('glowColor') || undefined,
                    font: urlParams.get('font') || undefined,
                    balloonColor: urlParams.get('balloonColor') || undefined,
                    yearOld: urlParams.get('yearOld') || undefined,
                    yearNew: urlParams.get('yearNew') || undefined,
                    fireworkIntensity: urlParams.get('fireworkIntensity') || undefined,
                    animationSpeed: urlParams.get('animationSpeed') || undefined,
                    showCity: urlParams.get('showCity') || undefined
                });
            }, 100);
        }

        // Notify parent that template is ready
        if (isEmbedded) {
            window.parent.postMessage({ type: 'templateReady' }, '*');
        }
    </script>
</body>

</html>
